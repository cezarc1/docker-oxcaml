name: Build OxCaml images

on:
  workflow_dispatch:
    inputs:
      opam_ref:
        description: "OxCaml opam-repository ref, branch, tag, or SHA"
        required: false
        default: "main"
      oxcaml_switch:
        description: "Optional OxCaml switch override, such as 5.2.0+ox"
        required: false
        default: ""
      force:
        description: "Rebuild even if the provenance tag already exists"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_NAMESPACE: cezarc1
  OXCAML_OPAM_REPOSITORY_URL: https://github.com/oxcaml/opam-repository.git

jobs:
  resolve:
    name: Resolve OxCaml snapshot
    runs-on: ubuntu-latest
    outputs:
      opam_sha: ${{ steps.snapshot.outputs.opam_sha }}
      opam_short_sha: ${{ steps.snapshot.outputs.opam_short_sha }}
      snapshot_tag: ${{ steps.snapshot.outputs.snapshot_tag }}
      compiler_version: ${{ steps.snapshot.outputs.compiler_version }}
      compiler_major_minor: ${{ steps.snapshot.outputs.compiler_major_minor }}
      compiler_package: ${{ steps.snapshot.outputs.compiler_package }}
      should_build: ${{ steps.existing.outputs.should_build }}
      force_build: ${{ steps.existing.outputs.force_build }}
      toolchain_exists: ${{ steps.existing.outputs.toolchain_exists }}
      playground_exists: ${{ steps.existing.outputs.playground_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream opam repository state
        id: snapshot
        env:
          INPUT_OPAM_REF: ${{ inputs.opam_ref || 'main' }}
          INPUT_OXCAML_SWITCH: ${{ inputs.oxcaml_switch || '' }}
        run: |
          if [ -n "$INPUT_OXCAML_SWITCH" ]; then
            export OXCAML_SWITCH="$INPUT_OXCAML_SWITCH"
          fi
          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < <(scripts/resolve-upstream.sh "$INPUT_OPAM_REF")

      - name: Check whether snapshot images already exist
        id: existing
        env:
          FORCE: ${{ inputs.force || false }}
          SNAPSHOT_TAG: ${{ steps.snapshot.outputs.snapshot_tag }}
        run: |
          toolchain="ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:${SNAPSHOT_TAG}"
          playground="ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:${SNAPSHOT_TAG}"

          if docker buildx imagetools inspect "$toolchain" >/dev/null 2>&1; then
            toolchain_exists=true
          else
            toolchain_exists=false
          fi

          if docker buildx imagetools inspect "$playground" >/dev/null 2>&1; then
            playground_exists=true
          else
            playground_exists=false
          fi

          if [ "$FORCE" = "true" ] || [ "$toolchain_exists" = "false" ] || [ "$playground_exists" = "false" ]; then
            should_build=true
          else
            should_build=false
          fi

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
          echo "force_build=$FORCE" >> "$GITHUB_OUTPUT"
          echo "toolchain_exists=$toolchain_exists" >> "$GITHUB_OUTPUT"
          echo "playground_exists=$playground_exists" >> "$GITHUB_OUTPUT"

  build:
    name: Build, smoke-test, and publish aliases
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
      SNAPSHOT_TAG: ${{ needs.resolve.outputs.snapshot_tag }}
      OPAM_SHA: ${{ needs.resolve.outputs.opam_sha }}
      COMPILER_VERSION: ${{ needs.resolve.outputs.compiler_version }}
      COMPILER_MAJOR_MINOR: ${{ needs.resolve.outputs.compiler_major_minor }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune --all --force
          df -h

      - name: Set build metadata
        id: meta
        run: |
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          version_tag="${COMPILER_VERSION/+/-}-ubuntu-24.04"
          minor_tag="${COMPILER_MAJOR_MINOR}-ox-ubuntu-24.04"

          echo "build_date=$build_date" >> "$GITHUB_OUTPUT"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"
          echo "minor_tag=$minor_tag" >> "$GITHUB_OUTPUT"

          {
            echo "toolchain_snapshot_tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:${SNAPSHOT_TAG}"
            if [ "$HAS_DOCKERHUB" = "true" ]; then
              echo "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-toolchain:${SNAPSHOT_TAG}"
            fi
            echo "EOF"

            echo "playground_snapshot_tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:${SNAPSHOT_TAG}"
            if [ "$HAS_DOCKERHUB" = "true" ]; then
              echo "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-playground:${SNAPSHOT_TAG}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push toolchain snapshot
        if: needs.resolve.outputs.force_build == 'true' || needs.resolve.outputs.toolchain_exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/toolchain/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.toolchain_snapshot_tags }}
          cache-from: type=gha,scope=oxcaml-toolchain-linux-amd64
          cache-to: type=gha,mode=max,scope=oxcaml-toolchain-linux-amd64
          build-args: |
            OXCAML_OPAM_REPOSITORY_REF=${{ env.OPAM_SHA }}
            OXCAML_SWITCH=${{ env.COMPILER_VERSION }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            dev.cezarc1.oxcaml.opam_repository_ref=${{ env.OPAM_SHA }}
            dev.cezarc1.oxcaml.compiler_package=${{ needs.resolve.outputs.compiler_package }}
            dev.cezarc1.oxcaml.compiler_version=${{ env.COMPILER_VERSION }}

      - name: Smoke-test toolchain snapshot
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:${SNAPSHOT_TAG}"
          scripts/smoke-image.sh "$image" toolchain
          scripts/check-image-labels.sh "$image" "$OPAM_SHA" "$COMPILER_VERSION"

      - name: Build and push playground snapshot
        if: needs.resolve.outputs.force_build == 'true' || needs.resolve.outputs.playground_exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/playground/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.playground_snapshot_tags }}
          cache-from: type=gha,scope=oxcaml-playground-linux-amd64
          cache-to: type=gha,mode=max,scope=oxcaml-playground-linux-amd64
          build-args: |
            TOOLCHAIN_IMAGE=ghcr.io/${{ github.repository_owner }}/oxcaml-toolchain:${{ env.SNAPSHOT_TAG }}
            OXCAML_OPAM_REPOSITORY_REF=${{ env.OPAM_SHA }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            dev.cezarc1.oxcaml.opam_repository_ref=${{ env.OPAM_SHA }}
            dev.cezarc1.oxcaml.compiler_package=${{ needs.resolve.outputs.compiler_package }}
            dev.cezarc1.oxcaml.compiler_version=${{ env.COMPILER_VERSION }}

      - name: Smoke-test playground snapshot
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:${SNAPSHOT_TAG}"
          scripts/smoke-image.sh "$image" playground
          scripts/check-image-labels.sh "$image" "$OPAM_SHA" "$COMPILER_VERSION"

      - name: Promote GHCR aliases
        env:
          VERSION_TAG: ${{ steps.meta.outputs.version_tag }}
          MINOR_TAG: ${{ steps.meta.outputs.minor_tag }}
        run: |
          docker buildx imagetools create \
            -t "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:${VERSION_TAG}" \
            -t "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:${MINOR_TAG}" \
            -t "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:latest" \
            "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:${SNAPSHOT_TAG}"

          docker buildx imagetools create \
            -t "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:${VERSION_TAG}" \
            -t "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:${MINOR_TAG}" \
            -t "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:latest" \
            "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:${SNAPSHOT_TAG}"

      - name: Promote Docker Hub aliases
        if: env.HAS_DOCKERHUB == 'true'
        env:
          VERSION_TAG: ${{ steps.meta.outputs.version_tag }}
          MINOR_TAG: ${{ steps.meta.outputs.minor_tag }}
        run: |
          docker buildx imagetools create \
            -t "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-toolchain:${VERSION_TAG}" \
            -t "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-toolchain:${MINOR_TAG}" \
            -t "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-toolchain:latest" \
            "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-toolchain:${SNAPSHOT_TAG}"

          docker buildx imagetools create \
            -t "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-playground:${VERSION_TAG}" \
            -t "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-playground:${MINOR_TAG}" \
            -t "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-playground:latest" \
            "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-playground:${SNAPSHOT_TAG}"
