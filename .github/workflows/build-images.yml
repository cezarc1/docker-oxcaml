name: Build OxCaml images

on:
  workflow_dispatch:
    inputs:
      opam_ref:
        description: "OxCaml opam-repository ref, branch, tag, or SHA"
        required: false
        default: "main"
      force:
        description: "Build even if the immutable snapshot tag already exists"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: read
  packages: write

env:
  GHCR_NAMESPACE: ${{ github.repository_owner }}
  DOCKERHUB_NAMESPACE: cezarc1
  OXCAML_OPAM_REPOSITORY_URL: https://github.com/oxcaml/opam-repository.git

jobs:
  resolve:
    name: Resolve OxCaml snapshot
    runs-on: ubuntu-latest
    outputs:
      opam_sha: ${{ steps.snapshot.outputs.opam_sha }}
      opam_short_sha: ${{ steps.snapshot.outputs.opam_short_sha }}
      snapshot_tag: ${{ steps.snapshot.outputs.snapshot_tag }}
      compiler_version: ${{ steps.snapshot.outputs.compiler_version }}
      compiler_package: ${{ steps.snapshot.outputs.compiler_package }}
      should_build: ${{ steps.existing.outputs.should_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream opam repository state
        id: snapshot
        env:
          INPUT_OPAM_REF: ${{ inputs.opam_ref || 'main' }}
        run: |
          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < <(scripts/resolve-upstream.sh "$INPUT_OPAM_REF")

      - name: Check whether immutable image already exists
        id: existing
        env:
          FORCE: ${{ inputs.force || false }}
          SNAPSHOT_TAG: ${{ steps.snapshot.outputs.snapshot_tag }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:${SNAPSHOT_TAG}"
          if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
            exists=true
          else
            exists=false
          fi
          if [ "$FORCE" = "true" ] || [ "$exists" = "false" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build and publish images
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune --all --force
          df -h

      - name: Set build metadata
        id: meta
        env:
          SNAPSHOT_TAG: ${{ needs.resolve.outputs.snapshot_tag }}
          COMPILER_VERSION: ${{ needs.resolve.outputs.compiler_version }}
        run: |
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "build_date=$build_date" >> "$GITHUB_OUTPUT"
          {
            echo "toolchain_tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:${SNAPSHOT_TAG}"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:${COMPILER_VERSION/+/-}-ubuntu-24.04"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:latest"
            if [ "$HAS_DOCKERHUB" = "true" ]; then
              echo "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-toolchain:${SNAPSHOT_TAG}"
              echo "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-toolchain:${COMPILER_VERSION/+/-}-ubuntu-24.04"
              echo "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-toolchain:latest"
            fi
            echo "EOF"
            echo "playground_tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:${SNAPSHOT_TAG}"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:${COMPILER_VERSION/+/-}-ubuntu-24.04"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:latest"
            if [ "$HAS_DOCKERHUB" = "true" ]; then
              echo "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-playground:${SNAPSHOT_TAG}"
              echo "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-playground:${COMPILER_VERSION/+/-}-ubuntu-24.04"
              echo "docker.io/${DOCKERHUB_NAMESPACE}/oxcaml-playground:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push toolchain image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/toolchain/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.toolchain_tags }}
          cache-from: type=gha,scope=oxcaml-toolchain-linux-amd64
          cache-to: type=gha,mode=max,scope=oxcaml-toolchain-linux-amd64
          build-args: |
            OXCAML_OPAM_REPOSITORY_REF=${{ needs.resolve.outputs.opam_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            dev.cezarc1.oxcaml.opam_repository_ref=${{ needs.resolve.outputs.opam_sha }}
            dev.cezarc1.oxcaml.compiler_package=${{ needs.resolve.outputs.compiler_package }}
            dev.cezarc1.oxcaml.compiler_version=${{ needs.resolve.outputs.compiler_version }}

      - name: Smoke-test pushed toolchain image
        env:
          SNAPSHOT_TAG: ${{ needs.resolve.outputs.snapshot_tag }}
        run: |
          scripts/smoke-image.sh "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-toolchain:${SNAPSHOT_TAG}" toolchain

      - name: Build and push playground image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/playground/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.playground_tags }}
          cache-from: type=gha,scope=oxcaml-playground-linux-amd64
          cache-to: type=gha,mode=max,scope=oxcaml-playground-linux-amd64
          build-args: |
            TOOLCHAIN_IMAGE=ghcr.io/${{ github.repository_owner }}/oxcaml-toolchain:${{ needs.resolve.outputs.snapshot_tag }}
            OXCAML_OPAM_REPOSITORY_REF=${{ needs.resolve.outputs.opam_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            dev.cezarc1.oxcaml.opam_repository_ref=${{ needs.resolve.outputs.opam_sha }}
            dev.cezarc1.oxcaml.compiler_package=${{ needs.resolve.outputs.compiler_package }}
            dev.cezarc1.oxcaml.compiler_version=${{ needs.resolve.outputs.compiler_version }}

      - name: Smoke-test pushed playground image
        env:
          SNAPSHOT_TAG: ${{ needs.resolve.outputs.snapshot_tag }}
        run: |
          scripts/smoke-image.sh "ghcr.io/${GITHUB_REPOSITORY_OWNER}/oxcaml-playground:${SNAPSHOT_TAG}" playground

      - name: Make GHCR packages public when possible
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/make-ghcr-public.sh

